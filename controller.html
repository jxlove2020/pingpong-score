<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="탁구">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.svg">
<title>탁구 컨트롤러</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+KR:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: #0a0a0f;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    font-family: 'Noto Sans KR', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
  }

  .top-bar h2 {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 3px;
  }

  .scoreboard-link {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    text-decoration: none;
    padding: 6px 12px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    transition: all 0.2s;
  }
  .scoreboard-link:active { background: rgba(255,255,255,0.05); }

  .mini-score {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 16px;
    flex-shrink: 0;
  }

  .mini-player {
    flex: 1;
    text-align: center;
    padding: 10px;
    border-radius: 12px;
  }

  .mini-player.A { background: rgba(0,200,255,0.05); border: 1px solid rgba(0,200,255,0.15); margin-right: 4px; }
  .mini-player.B { background: rgba(255,60,120,0.05); border: 1px solid rgba(255,60,120,0.15); margin-left: 4px; }

  .mini-name { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 4px; letter-spacing: 1px; }

  .mini-score-num {
    font-family: 'Orbitron', monospace;
    font-size: 36px;
    font-weight: 900;
    line-height: 1;
  }

  .mini-player.A .mini-score-num { color: #00c8ff; text-shadow: 0 0 15px rgba(0,200,255,0.4); }
  .mini-player.B .mini-score-num { color: #ff3c78; text-shadow: 0 0 15px rgba(255,60,120,0.4); }

  .mini-sets { font-size: 10px; margin-top: 4px; letter-spacing: 1px; }
  .mini-player.A .mini-sets { color: rgba(0,200,255,0.5); }
  .mini-player.B .mini-sets { color: rgba(255,60,120,0.5); }

  .mini-player { cursor: pointer; transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.1s; }
  .mini-player:active { transform: scale(0.96); }
  .mini-player.A.serving {
    background: rgba(0,200,255,0.14);
    border-color: #00c8ff;
    box-shadow: 0 0 18px rgba(0,200,255,0.45), inset 0 0 20px rgba(0,200,255,0.08);
  }
  .mini-player.B.serving {
    background: rgba(255,60,120,0.14);
    border-color: #ff3c78;
    box-shadow: 0 0 18px rgba(255,60,120,0.45), inset 0 0 20px rgba(255,60,120,0.08);
  }
  .serve-tap-hint { font-size: 9px; color: rgba(255,255,255,0.15); letter-spacing: 1px; margin-top: 6px; }
  .mini-player.serving .serve-tap-hint { display: none; }

  .mini-divider { width: 40px; text-align: center; flex-shrink: 0; }

  .serve-badge { font-size: 9px; letter-spacing: 1px; color: rgba(255,255,255,0.3); margin-top: 4px; }

  .serve-indicator {
    font-size: 18px;
    animation: blink 1s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .main-buttons {
    display: flex;
    flex: 1;
    gap: 8px;
    padding: 0 16px 16px;
    min-height: 0;
  }

  .score-btn {
    flex: 1;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.08s ease, filter 0.08s ease;
    position: relative;
    overflow: hidden;
  }

  .score-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.1s;
  }

  .score-btn:active { transform: scale(0.95); filter: brightness(1.3); }
  .score-btn:active::before { opacity: 1; }

  .score-btn.A {
    background: linear-gradient(160deg, #003a5e 0%, #005580 50%, #002a44 100%);
    border: 2px solid rgba(0,200,255,0.3);
    box-shadow: 0 4px 30px rgba(0,200,255,0.15), inset 0 1px 0 rgba(0,200,255,0.2);
  }
  .score-btn.A::before { background: radial-gradient(circle, rgba(0,200,255,0.3), transparent); }

  .score-btn.B {
    background: linear-gradient(160deg, #5e0020 0%, #800030 50%, #440015 100%);
    border: 2px solid rgba(255,60,120,0.3);
    box-shadow: 0 4px 30px rgba(255,60,120,0.15), inset 0 1px 0 rgba(255,60,120,0.2);
  }
  .score-btn.B::before { background: radial-gradient(circle, rgba(255,60,120,0.3), transparent); }

  .btn-label { font-size: clamp(13px, 3vw, 16px); font-weight: 700; letter-spacing: 1px; }
  .score-btn.A .btn-label { color: #00c8ff; }
  .score-btn.B .btn-label { color: #ff3c78; }

  .btn-score {
    font-family: 'Orbitron', monospace;
    font-size: clamp(48px, 14vw, 90px);
    font-weight: 900;
    color: #fff;
    line-height: 1;
  }

  .btn-hint { font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 1px; }

  .bottom-toolbar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 8px;
    padding: 0 16px 16px;
    flex-shrink: 0;
  }

  .tool-btn {
    padding: 10px 4px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    color: rgba(255,255,255,0.5);
    font-size: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .tool-btn:active { background: rgba(255,255,255,0.1); color: #fff; transform: scale(0.96); }
  .tool-btn .icon { font-size: 16px; }
  .tool-btn.danger { border-color: rgba(255,80,80,0.2); }
  .tool-btn.danger:active { background: rgba(255,80,80,0.15); color: #ff5050; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: #141420;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    max-width: 340px;
  }

  .modal h3 { color: #fff; font-size: 16px; margin-bottom: 20px; text-align: center; letter-spacing: 2px; }

  .modal-field { margin-bottom: 16px; }

  .modal-field label { display: block; font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 6px; letter-spacing: 1px; }

  .modal-field input, .modal-field select {
    width: 100%;
    padding: 10px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    color: #fff;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
  }

  .modal-field input:focus, .modal-field select:focus { border-color: rgba(255,255,255,0.3); }
  .modal-field select option { background: #141420; }

  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

  .modal-btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .modal-btn.cancel { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); }
  .modal-btn.confirm { background: linear-gradient(135deg, #00c8ff, #0088cc); color: #fff; }
  .modal-btn.danger { background: linear-gradient(135deg, #ff5050, #cc2020); color: #fff; }

  /* 모바일 가로모드 */
  @media (orientation: landscape) and (max-height: 500px) {
    .top-bar { padding: 8px 16px; }
    .top-bar h2 { font-size: 11px; }
    .mini-score { padding: 6px 16px; }
    .mini-player { padding: 6px 8px; }
    .mini-score-num { font-size: 26px; }
    .mini-sets { display: none; }
    .serve-tap-hint { display: none; }
    .mini-divider { width: 28px; }
    .serve-indicator { font-size: 14px; }
    .main-buttons { padding: 0 12px 8px; gap: 6px; }
    .btn-score { font-size: clamp(32px, 9vw, 64px); }
    .btn-hint { font-size: 9px; }
    .bottom-toolbar { padding: 0 12px 8px; gap: 6px; }
    .tool-btn { padding: 6px 4px; font-size: 9px; }
    .tool-btn .icon { font-size: 13px; }
  }

  .undo-toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(255,200,0,0.9);
    color: #000;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 200;
  }
  .undo-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="top-bar">
  <h2>CONTROLLER · <span id="chLabel" style="color:rgba(0,200,255,0.6)"></span></h2>
  <a id="scoreboardLink" href="scoreboard.html" class="scoreboard-link">점수판 보기 →</a>
</div>

<div class="mini-score">
  <div class="mini-player A" id="miniPanelA" onclick="setServe('A')">
    <div class="mini-name" id="miniNameA">플레이어 1</div>
    <div class="mini-score-num" id="miniScoreA">0</div>
    <div class="mini-sets" id="miniSetsA">세트 0</div>
    <div class="serve-tap-hint">탭 → 서브</div>
  </div>
  <div class="mini-divider">
    <div class="serve-indicator">🏓</div>
    <div class="serve-badge" id="serveBadge">서브</div>
  </div>
  <div class="mini-player B" id="miniPanelB" onclick="setServe('B')">
    <div class="mini-name" id="miniNameB">플레이어 2</div>
    <div class="mini-score-num" id="miniScoreB">0</div>
    <div class="mini-sets" id="miniSetsB">세트 0</div>
    <div class="serve-tap-hint">탭 → 서브</div>
  </div>
</div>

<div class="main-buttons">
  <button class="score-btn A" ontouchstart="" id="btnA">
    <div class="btn-label" id="btnLabelA">플레이어 1</div>
    <div class="btn-score" id="btnScoreA">0</div>
    <div class="btn-hint">터치하여 득점</div>
  </button>
  <button class="score-btn B" ontouchstart="" id="btnB">
    <div class="btn-label" id="btnLabelB">플레이어 2</div>
    <div class="btn-score" id="btnScoreB">0</div>
    <div class="btn-hint">터치하여 득점</div>
  </button>
</div>

<div class="bottom-toolbar">
  <button class="tool-btn" onclick="openModal('undoModal')">
    <span class="icon">↩️</span>점수 취소
  </button>
  <button class="tool-btn" onclick="openSettings()">
    <span class="icon">⚙️</span>설정
  </button>
  <button class="tool-btn danger" onclick="openModal('resetScoreModal')">
    <span class="icon">🔄</span>세트 리셋
  </button>
  <button class="tool-btn danger" onclick="openModal('resetModal')">
    <span class="icon">🗑️</span>전체 초기화
  </button>
</div>

<!-- 설정 모달 -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h3>⚙️ 설정</h3>
    <div class="modal-field">
      <label>플레이어 1 이름 (파란팀)</label>
      <input type="text" id="inputNameA" maxlength="12" placeholder="플레이어 1">
    </div>
    <div class="modal-field">
      <label>플레이어 2 이름 (빨간팀)</label>
      <input type="text" id="inputNameB" maxlength="12" placeholder="플레이어 2">
    </div>
    <div class="modal-field">
      <label>게임 포인트</label>
      <select id="inputGP">
        <option value="11">11점 (표준)</option>
        <option value="21">21점 (옛날 룰)</option>
        <option value="5">5점 (빠른 게임)</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal('settingsModal')">취소</button>
      <button class="modal-btn confirm" onclick="saveSettings()">저장</button>
    </div>
  </div>
</div>

<!-- 점수 취소 모달 -->
<div class="modal-overlay" id="undoModal">
  <div class="modal">
    <h3>↩️ 점수 취소</h3>
    <div class="modal-field"><label>어느 팀 점수를 취소할까요?</label></div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="undoScore('A')">파란팀 -1</button>
      <button class="modal-btn danger" onclick="undoScore('B')">빨간팀 -1</button>
    </div>
    <div class="modal-actions" style="margin-top:8px;">
      <button class="modal-btn cancel" onclick="closeModal('undoModal')">닫기</button>
    </div>
  </div>
</div>

<!-- 세트 리셋 모달 -->
<div class="modal-overlay" id="resetScoreModal">
  <div class="modal">
    <h3>🔄 현재 세트 리셋</h3>
    <div class="modal-field">
      <label style="color:rgba(255,200,0,0.7)">현재 세트 점수만 0으로 초기화합니다.</label>
    </div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal('resetScoreModal')">취소</button>
      <button class="modal-btn danger" onclick="confirmResetScore()">초기화</button>
    </div>
  </div>
</div>

<!-- 전체 초기화 모달 -->
<div class="modal-overlay" id="resetModal">
  <div class="modal">
    <h3>🗑️ 전체 초기화</h3>
    <div class="modal-field">
      <label style="color:rgba(255,100,100,0.8)">점수와 세트 기록이 모두 초기화됩니다.</label>
    </div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal('resetModal')">취소</button>
      <button class="modal-btn danger" onclick="confirmReset()">전체 초기화</button>
    </div>
  </div>
</div>

<div class="undo-toast" id="undoToast">점수가 취소되었습니다</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCT4GDB5V_TMrMGfXINAnlY2wlxw86wKwE",
    authDomain: "pingpong-e357a.firebaseapp.com",
    databaseURL: "https://pingpong-e357a-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "pingpong-e357a",
    storageBucket: "pingpong-e357a.firebasestorage.app",
    messagingSenderId: "973135986658",
    appId: "1:973135986658:web:85c31f2384334fa58003bb"
  };

  const params = new URLSearchParams(location.search);
  const channelId = (params.get('ch') || '1').replace(/[.#$/\[\]]/g, '-');

  document.getElementById('chLabel').textContent = 'CH · ' + channelId.toUpperCase();
  document.getElementById('scoreboardLink').href = 'scoreboard.html?ch=' + encodeURIComponent(channelId);
  document.title = `탁구 컨트롤러 · CH ${channelId}`;

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const gameRef = ref(db, 'game/' + channelId);

  const DEFAULT_STATE = {
    playerA: { name: '플레이어 1', score: 0, sets: 0 },
    playerB: { name: '플레이어 2', score: 0, sets: 0 },
    serving: 'A',
    initialServing: 'A',
    gamePoint: 11
  };

  // 현재 점수와 첫 서브권으로 서브를 역산
  function computeServing(scoreA, scoreB, initialServing, gamePoint) {
    const total = scoreA + scoreB;
    const deuce = scoreA >= (gamePoint - 1) && scoreB >= (gamePoint - 1);
    if (deuce) {
      const pointsSinceDeuce = total - 2 * (gamePoint - 1);
      return pointsSinceDeuce % 2 === 0 ? initialServing : (initialServing === 'A' ? 'B' : 'A');
    }
    const serveBlock = Math.floor(total / 2);
    return serveBlock % 2 === 0 ? initialServing : (initialServing === 'A' ? 'B' : 'A');
  }

  let currentState = null;

  // DB에 데이터 없으면 기본값으로 초기화
  onValue(gameRef, (snapshot) => {
    if (!snapshot.exists()) {
      set(gameRef, DEFAULT_STATE);
      return;
    }
    currentState = snapshot.val();
    updateUI(currentState);
  });

  function updateUI(g) {
    document.getElementById('miniNameA').textContent = g.playerA.name;
    document.getElementById('miniNameB').textContent = g.playerB.name;
    document.getElementById('miniScoreA').textContent = g.playerA.score;
    document.getElementById('miniScoreB').textContent = g.playerB.score;
    document.getElementById('miniSetsA').textContent = `세트 ${g.playerA.sets}`;
    document.getElementById('miniSetsB').textContent = `세트 ${g.playerB.sets}`;
    document.getElementById('btnLabelA').textContent = g.playerA.name;
    document.getElementById('btnScoreA').textContent = g.playerA.score;
    document.getElementById('btnLabelB').textContent = g.playerB.name;
    document.getElementById('btnScoreB').textContent = g.playerB.score;
    const serverName = g.serving === 'A' ? g.playerA.name : g.playerB.name;
    document.getElementById('serveBadge').textContent = serverName + ' 서브';
    document.getElementById('miniPanelA').classList.toggle('serving', g.serving === 'A');
    document.getElementById('miniPanelB').classList.toggle('serving', g.serving === 'B');
  }

  async function addScore(player) {
    await runTransaction(gameRef, (g) => {
      if (!g) return g;
      if (!g.initialServing) g.initialServing = g.serving || 'A';
      if (player === 'A') g.playerA.score += 1;
      else g.playerB.score += 1;

      const a = g.playerA.score, b = g.playerB.score, gp = g.gamePoint;
      if ((a >= gp || b >= gp) && Math.abs(a - b) >= 2) {
        if (a > b) g.playerA.sets += 1;
        else g.playerB.sets += 1;
        g.playerA.score = 0;
        g.playerB.score = 0;
        g.initialServing = a > b ? 'B' : 'A';
      }
      g.serving = computeServing(g.playerA.score, g.playerB.score, g.initialServing, g.gamePoint);
      return g;
    });
    if (navigator.vibrate) navigator.vibrate(30);
  }

  window.undoScore = async (player) => {
    let changed = false;
    await runTransaction(gameRef, (g) => {
      if (!g) return g;
      if (!g.initialServing) g.initialServing = g.serving || 'A';
      const current = player === 'A' ? g.playerA.score : g.playerB.score;
      if (current === 0) return g;
      if (player === 'A') g.playerA.score -= 1;
      else g.playerB.score -= 1;
      g.serving = computeServing(g.playerA.score, g.playerB.score, g.initialServing, g.gamePoint);
      changed = true;
      return g;
    });
    closeModal('undoModal');
    if (changed) {
      showToast('점수가 취소되었습니다');
      if (navigator.vibrate) navigator.vibrate([20, 50, 20]);
    } else {
      showToast('취소할 점수가 없습니다');
    }
  };

  window.saveSettings = async () => {
    const nameA = document.getElementById('inputNameA').value.trim() || '플레이어 1';
    const nameB = document.getElementById('inputNameB').value.trim() || '플레이어 2';
    const gp = parseInt(document.getElementById('inputGP').value);
    await runTransaction(gameRef, (g) => {
      if (!g) return g;
      g.playerA.name = nameA;
      g.playerB.name = nameB;
      g.gamePoint = gp;
      g.serving = computeServing(g.playerA.score, g.playerB.score, g.initialServing || 'A', gp);
      return g;
    });
    closeModal('settingsModal');
  };

  window.confirmReset = async () => {
    await set(gameRef, { ...DEFAULT_STATE });
    closeModal('resetModal');
    if (navigator.vibrate) navigator.vibrate([30, 50, 30, 50, 30]);
  };

  window.confirmResetScore = async () => {
    await runTransaction(gameRef, (g) => {
      if (!g) return g;
      g.playerA.score = 0;
      g.playerB.score = 0;
      g.initialServing = 'A';
      g.serving = 'A';
      return g;
    });
    closeModal('resetScoreModal');
  };

  window.openSettings = () => {
    if (currentState) {
      document.getElementById('inputNameA').value = currentState.playerA.name;
      document.getElementById('inputNameB').value = currentState.playerB.name;
      document.getElementById('inputGP').value = currentState.gamePoint;
    }
    document.getElementById('settingsModal').classList.add('open');
  };

  window.setServe = async (player) => {
    await runTransaction(gameRef, (g) => {
      if (!g) return g;
      if (!g.initialServing) g.initialServing = 'A';
      const testA = computeServing(g.playerA.score, g.playerB.score, 'A', g.gamePoint);
      g.initialServing = (testA === player) ? 'A' : 'B';
      g.serving = player;
      return g;
    });
    if (navigator.vibrate) navigator.vibrate(20);
  };

  const lastTap = { A: 0, B: 0 };
  function guardedScore(player) {
    const now = Date.now();
    if (now - lastTap[player] < 600) return;
    lastTap[player] = now;
    addScore(player);
  }

  document.getElementById('btnA').addEventListener('click', () => guardedScore('A'));
  document.getElementById('btnB').addEventListener('click', () => guardedScore('B'));

  document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', (e) => { if (e.target === el) el.classList.remove('open'); });
  });
</script>

<script>
  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  function showToast(msg) {
    const t = document.getElementById('undoToast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }
</script>
<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
