<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>탁구 점수판</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+KR:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Noto Sans KR', sans-serif;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(0, 200, 255, 0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, rgba(255, 60, 120, 0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .title-bar {
    text-align: center;
    margin-bottom: 20px;
    z-index: 1;
  }

  .title-bar h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(14px, 3vw, 22px);
    color: #fff;
    letter-spacing: 6px;
    text-transform: uppercase;
    opacity: 0.7;
  }

  .title-bar .subtitle {
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 3px;
    margin-top: 4px;
  }

  .scoreboard {
    display: flex;
    align-items: stretch;
    gap: 0;
    width: min(98vw, 900px);
    z-index: 1;
  }

  .player-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 28px;
    position: relative;
    transition: all 0.3s ease;
  }

  .player-panel.A {
    background: linear-gradient(160deg, #001a2e 0%, #002a44 50%, #001520 100%);
    border: 1px solid rgba(0, 200, 255, 0.2);
    border-right: none;
    border-radius: 16px 0 0 16px;
    box-shadow: inset 0 0 60px rgba(0, 200, 255, 0.05), -4px 0 30px rgba(0, 200, 255, 0.1);
  }

  .player-panel.B {
    background: linear-gradient(160deg, #2e0010 0%, #44001a 50%, #200010 100%);
    border: 1px solid rgba(255, 60, 120, 0.2);
    border-left: none;
    border-radius: 0 16px 16px 0;
    box-shadow: inset 0 0 60px rgba(255, 60, 120, 0.05), 4px 0 30px rgba(255, 60, 120, 0.1);
  }

  .player-panel.serving::after {
    content: '▶ 서브';
    position: absolute;
    bottom: 8px;
    font-size: 11px;
    letter-spacing: 2px;
    font-weight: bold;
    animation: blink 1s ease-in-out infinite;
  }

  .player-panel.A.serving::after { color: #00c8ff; right: 12px; }
  .player-panel.B.serving::after { content: '서브 ◀'; color: #ff3c78; left: 12px; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .player-name {
    font-size: clamp(16px, 3.5vw, 28px);
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 8px;
    text-align: center;
  }

  .player-panel.A .player-name { color: #00c8ff; text-shadow: 0 0 20px rgba(0,200,255,0.5); }
  .player-panel.B .player-name { color: #ff3c78; text-shadow: 0 0 20px rgba(255,60,120,0.5); }

  .sets-display {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    height: 20px;
    align-items: center;
  }

  .set-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    transition: all 0.3s ease;
  }

  .player-panel.A .set-dot.won { background: #00c8ff; box-shadow: 0 0 8px #00c8ff; border-color: #00c8ff; }
  .player-panel.B .set-dot.won { background: #ff3c78; box-shadow: 0 0 8px #ff3c78; border-color: #ff3c78; }

  .score {
    font-family: 'Orbitron', monospace;
    font-size: clamp(80px, 20vw, 180px);
    font-weight: 900;
    line-height: 1;
    transition: transform 0.15s ease;
    position: relative;
  }

  .player-panel.A .score {
    color: #fff;
    text-shadow: 0 0 40px rgba(0,200,255,0.4), 0 0 80px rgba(0,200,255,0.2);
  }

  .player-panel.B .score {
    color: #fff;
    text-shadow: 0 0 40px rgba(255,60,120,0.4), 0 0 80px rgba(255,60,120,0.2);
  }

  .score.bump { transform: scale(1.12); }

  .divider {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
    z-index: 2;
    gap: 8px;
  }

  .divider-line {
    width: 2px;
    flex: 1;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.15), transparent);
  }

  .vs-text {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 2px;
  }

  .game-point-badge {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 1px;
    text-align: center;
  }

  .footer {
    margin-top: 20px;
    text-align: center;
    z-index: 1;
  }

  .controller-link {
    display: inline-block;
    padding: 10px 28px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50px;
    color: rgba(255,255,255,0.4);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 2px;
    transition: all 0.3s ease;
  }

  .controller-link:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }

  .score-flash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s ease;
  }

  .score-flash.A { background: radial-gradient(ellipse at left, rgba(0,200,255,0.15) 0%, transparent 70%); }
  .score-flash.B { background: radial-gradient(ellipse at right, rgba(255,60,120,0.15) 0%, transparent 70%); }
  .score-flash.active { opacity: 1; }
</style>
</head>
<body>

<div class="score-flash A" id="flashA"></div>
<div class="score-flash B" id="flashB"></div>

<div class="title-bar">
  <h1>Table Tennis</h1>
  <div class="subtitle">SCOREBOARD</div>
</div>

<div class="scoreboard">
  <div class="player-panel A" id="panelA">
    <div class="player-name" id="nameA">플레이어 1</div>
    <div class="sets-display" id="setsA"></div>
    <div class="score" id="scoreA">0</div>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="vs-text">VS</div>
    <div class="game-point-badge" id="gpBadge">11P</div>
    <div class="divider-line"></div>
  </div>

  <div class="player-panel B" id="panelB">
    <div class="player-name" id="nameB">플레이어 2</div>
    <div class="sets-display" id="setsB"></div>
    <div class="score" id="scoreB">0</div>
  </div>
</div>

<div class="footer">
  <a href="controller.html" class="controller-link">컨트롤러 열기 →</a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCT4GDB5V_TMrMGfXINAnlY2wlxw86wKwE",
    authDomain: "pingpong-e357a.firebaseapp.com",
    databaseURL: "https://pingpong-e357a-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "pingpong-e357a",
    storageBucket: "pingpong-e357a.firebasestorage.app",
    messagingSenderId: "973135986658",
    appId: "1:973135986658:web:85c31f2384334fa58003bb"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const gameRef = ref(db, 'game');

  function renderSets(el, count) {
    el.innerHTML = '';
    for (let i = 0; i < 5; i++) {
      const dot = document.createElement('div');
      dot.className = 'set-dot' + (i < count ? ' won' : '');
      el.appendChild(dot);
    }
  }

  function flash(player) {
    const el = document.getElementById('flash' + player);
    el.classList.add('active');
    setTimeout(() => el.classList.remove('active'), 300);
  }

  function bump(id) {
    const el = document.getElementById(id);
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 200);
  }

  // 점수판 화면이 꺼지지 않도록 유지
  async function keepScreenOn() {
    if ('wakeLock' in navigator) {
      try {
        await navigator.wakeLock.request('screen');
      } catch (e) {}
    }
  }
  keepScreenOn();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') keepScreenOn();
  });

  let prevA = -1, prevB = -1;

  onValue(gameRef, (snapshot) => {
    const g = snapshot.val();
    if (!g) return;

    document.getElementById('nameA').textContent = g.playerA.name;
    document.getElementById('nameB').textContent = g.playerB.name;

    if (prevA !== -1 && g.playerA.score !== prevA) { flash('A'); bump('scoreA'); }
    if (prevB !== -1 && g.playerB.score !== prevB) { flash('B'); bump('scoreB'); }

    prevA = g.playerA.score;
    prevB = g.playerB.score;

    document.getElementById('scoreA').textContent = g.playerA.score;
    document.getElementById('scoreB').textContent = g.playerB.score;
    document.getElementById('gpBadge').textContent = g.gamePoint + 'P';

    renderSets(document.getElementById('setsA'), g.playerA.sets);
    renderSets(document.getElementById('setsB'), g.playerB.sets);

    document.getElementById('panelA').classList.toggle('serving', g.serving === 'A');
    document.getElementById('panelB').classList.toggle('serving', g.serving === 'B');
  });
</script>
</body>
</html>
