<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="탁구">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.svg">
<title>탁구 점수판 - 채널 선택</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+KR:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { height: 100%; }

  body {
    background: #0a0a0f;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 40px 24px 60px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(0, 200, 255, 0.05) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 70%, rgba(255, 60, 120, 0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .wrap { width: min(100%, 480px); display: flex; flex-direction: column; align-items: center; gap: 0; }

  .title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(18px, 4vw, 26px);
    color: #fff;
    letter-spacing: 6px;
    text-transform: uppercase;
    opacity: 0.8;
    text-align: center;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 3px;
    text-align: center;
    margin-bottom: 32px;
  }

  /* ── 활성 채널 섹션 ── */
  .active-section { width: 100%; margin-bottom: 32px; }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .section-label {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .live-dot {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: rgba(0,255,120,0.6);
    letter-spacing: 1px;
  }

  .live-dot::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #00ff78;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .search-input {
    width: 100%;
    padding: 11px 16px 11px 40px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: #fff;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    margin-bottom: 12px;
  }

  .search-wrap {
    position: relative;
    width: 100%;
    margin-bottom: 12px;
  }

  .search-icon {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    opacity: 0.35;
    pointer-events: none;
  }

  .search-input:focus { border-color: rgba(255,255,255,0.25); }
  .search-input::placeholder { color: rgba(255,255,255,0.2); }

  .active-list { width: 100%; display: flex; flex-direction: column; gap: 8px; }

  .active-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    transition: background 0.2s, border-color 0.2s;
  }

  @media (hover: hover) {
    .active-card:hover {
      background: rgba(0,200,255,0.06);
      border-color: rgba(0,200,255,0.2);
    }
  }

  .active-card.hidden { display: none; }

  .ch-id {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    color: rgba(0,200,255,0.7);
    min-width: 36px;
    text-align: center;
    background: rgba(0,200,255,0.08);
    border: 1px solid rgba(0,200,255,0.15);
    border-radius: 8px;
    padding: 4px 8px;
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  .ch-info { flex: 1; min-width: 0; }

  .ch-matchup {
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .ch-score {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
  }

  .ch-score .sa { color: rgba(0,200,255,0.6); }
  .ch-score .sb { color: rgba(255,60,120,0.6); }

  .card-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .card-btn {
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    letter-spacing: 0.5px;
    text-decoration: none;
    transition: all 0.2s;
    border: 1px solid;
  }

  .card-btn.score {
    background: rgba(0,200,255,0.08);
    border-color: rgba(0,200,255,0.2);
    color: rgba(0,200,255,0.7);
  }
  @media (hover: hover) {
    .card-btn.score:hover { background: rgba(0,200,255,0.18); color: #00c8ff; }
  }

  .card-btn.ctrl {
    background: rgba(255,60,120,0.08);
    border-color: rgba(255,60,120,0.2);
    color: rgba(255,60,120,0.7);
  }
  @media (hover: hover) {
    .card-btn.ctrl:hover { background: rgba(255,60,120,0.18); color: #ff3c78; }
  }

  .card-btn.del {
    background: rgba(255,255,255,0.03);
    border-color: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.2);
    padding: 6px 8px;
  }
  @media (hover: hover) {
    .card-btn.del:hover { background: rgba(255,60,60,0.15); border-color: rgba(255,60,60,0.3); color: rgba(255,80,80,0.9); }
  }

  /* 삭제 확인 팝업 */
  .confirm-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .confirm-overlay.open { display: flex; }

  .confirm-box {
    background: #141420;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px;
    padding: 24px;
    width: 100%;
    max-width: 300px;
    text-align: center;
  }

  .confirm-box h3 { color: #fff; font-size: 15px; margin-bottom: 10px; }
  .confirm-box p { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 20px; letter-spacing: 0.5px; }

  .confirm-btns { display: flex; gap: 10px; }

  .confirm-btn {
    flex: 1;
    padding: 11px;
    border: none;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    letter-spacing: 0.5px;
  }

  .confirm-btn.cancel { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); }
  .confirm-btn.ok { background: linear-gradient(135deg, #ff4444, #cc1111); color: #fff; }

  .empty-msg {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 1px;
    border: 1px dashed rgba(255,255,255,0.07);
    border-radius: 12px;
  }

  .no-result-msg {
    display: none;
    text-align: center;
    padding: 16px;
    font-size: 12px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 1px;
  }

  /* ── 구분선 ── */
  .divider {
    width: 100%;
    border: none;
    border-top: 1px solid rgba(255,255,255,0.06);
    margin: 4px 0 28px;
  }

  /* ── 빠른 채널 그리드 ── */
  .preset-section { width: 100%; margin-bottom: 32px; }

  .channel-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
  }

  .channel-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 16px 10px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    transition: background 0.2s, border-color 0.2s, transform 0.2s;
  }

  @media (hover: hover) {
    .channel-card:hover {
      background: rgba(0,200,255,0.07);
      border-color: rgba(0,200,255,0.2);
      transform: translateY(-2px);
    }
  }

  .channel-num {
    font-family: 'Orbitron', monospace;
    font-size: 24px;
    font-weight: 900;
    color: rgba(0,200,255,0.75);
    line-height: 1;
  }

  .channel-label { font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 2px; }

  .channel-actions { display: flex; gap: 5px; width: 100%; }

  .ch-btn {
    flex: 1;
    padding: 6px 4px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 7px;
    background: rgba(255,255,255,0.03);
    color: rgba(255,255,255,0.4);
    font-size: 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
    text-decoration: none;
    text-align: center;
    display: block;
  }

  @media (hover: hover) {
    .ch-btn.score:hover { background: rgba(0,200,255,0.12); border-color: rgba(0,200,255,0.3); color: #00c8ff; }
    .ch-btn.ctrl:hover  { background: rgba(255,60,120,0.12); border-color: rgba(255,60,120,0.3); color: #ff3c78; }
  }

  /* ── 직접 입력 ── */
  .custom-section { width: 100%; }

  .custom-row { display: flex; gap: 10px; width: 100%; align-items: center; }

  .custom-input {
    flex: 1;
    padding: 11px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    color: #fff;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
  }

  .custom-input::placeholder { color: rgba(255,255,255,0.2); }
  .custom-input:focus { border-color: rgba(255,255,255,0.3); }

  .custom-go {
    padding: 11px 20px;
    background: linear-gradient(135deg, rgba(0,200,255,0.15), rgba(0,136,204,0.15));
    border: 1px solid rgba(0,200,255,0.25);
    border-radius: 12px;
    color: #00c8ff;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  @media (hover: hover) {
    .custom-go:hover { background: linear-gradient(135deg, rgba(0,200,255,0.25), rgba(0,136,204,0.25)); }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="title">Table Tennis</div>
  <div class="subtitle">채널을 선택하세요</div>

  <!-- 활성 채널 -->
  <div class="active-section">
    <div class="section-header">
      <div class="section-label">활성 채널</div>
      <div class="live-dot">LIVE</div>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="text" placeholder="채널명 또는 선수 이름으로 검색" autocomplete="off">
    </div>

    <div class="active-list" id="activeList">
      <div class="empty-msg" id="emptyMsg">연결 중...</div>
    </div>
    <div class="no-result-msg" id="noResultMsg">검색 결과가 없습니다</div>
  </div>

  <hr class="divider">

  <!-- 빠른 채널 -->
  <div class="preset-section">
    <div class="section-header" style="margin-bottom:12px;">
      <div class="section-label">빠른 채널 선택</div>
    </div>
    <div class="channel-grid">
      <div class="channel-card">
        <div class="channel-num">1</div>
        <div class="channel-label">CHANNEL</div>
        <div class="channel-actions">
          <a class="ch-btn score" href="scoreboard.html?ch=1">점수판</a>
          <a class="ch-btn ctrl" href="controller.html?ch=1">컨트롤</a>
        </div>
      </div>
      <div class="channel-card">
        <div class="channel-num">2</div>
        <div class="channel-label">CHANNEL</div>
        <div class="channel-actions">
          <a class="ch-btn score" href="scoreboard.html?ch=2">점수판</a>
          <a class="ch-btn ctrl" href="controller.html?ch=2">컨트롤</a>
        </div>
      </div>
      <div class="channel-card">
        <div class="channel-num">3</div>
        <div class="channel-label">CHANNEL</div>
        <div class="channel-actions">
          <a class="ch-btn score" href="scoreboard.html?ch=3">점수판</a>
          <a class="ch-btn ctrl" href="controller.html?ch=3">컨트롤</a>
        </div>
      </div>
      <div class="channel-card">
        <div class="channel-num">4</div>
        <div class="channel-label">CHANNEL</div>
        <div class="channel-actions">
          <a class="ch-btn score" href="scoreboard.html?ch=4">점수판</a>
          <a class="ch-btn ctrl" href="controller.html?ch=4">컨트롤</a>
        </div>
      </div>
      <div class="channel-card">
        <div class="channel-num">5</div>
        <div class="channel-label">CHANNEL</div>
        <div class="channel-actions">
          <a class="ch-btn score" href="scoreboard.html?ch=5">점수판</a>
          <a class="ch-btn ctrl" href="controller.html?ch=5">컨트롤</a>
        </div>
      </div>
      <div class="channel-card">
        <div class="channel-num">6</div>
        <div class="channel-label">CHANNEL</div>
        <div class="channel-actions">
          <a class="ch-btn score" href="scoreboard.html?ch=6">점수판</a>
          <a class="ch-btn ctrl" href="controller.html?ch=6">컨트롤</a>
        </div>
      </div>
    </div>
  </div>

  <hr class="divider">

  <!-- 직접 입력 -->
  <div class="custom-section">
    <div class="section-header" style="margin-bottom:12px;">
      <div class="section-label">직접 채널 입력</div>
    </div>
    <div class="custom-row">
      <input class="custom-input" id="customCh" type="text" maxlength="20" placeholder="채널 이름 (예: table-A)">
      <button class="custom-go" onclick="goCustom()">입장 →</button>
    </div>
  </div>

</div>

<!-- 삭제 확인 팝업 -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>채널 삭제</h3>
    <p id="confirmMsg"></p>
    <input id="pinInput" type="password" inputmode="numeric" maxlength="4"
      placeholder="비밀번호 입력"
      style="width:100%;padding:10px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;color:#fff;font-size:18px;text-align:center;letter-spacing:6px;outline:none;margin-bottom:8px;font-family:monospace;">
    <p id="pinError" style="font-size:11px;color:#ff5050;min-height:16px;margin-bottom:12px;text-align:center;"></p>
    <div class="confirm-btns">
      <button class="confirm-btn cancel" onclick="closeConfirm()">취소</button>
      <button class="confirm-btn ok" onclick="doDelete()">삭제</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCT4GDB5V_TMrMGfXINAnlY2wlxw86wKwE",
    authDomain: "pingpong-e357a.firebaseapp.com",
    databaseURL: "https://pingpong-e357a-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "pingpong-e357a",
    storageBucket: "pingpong-e357a.firebasestorage.app",
    messagingSenderId: "973135986658",
    appId: "1:973135986658:web:85c31f2384334fa58003bb"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let allChannels = [];

  onValue(ref(db, 'game'), (snapshot) => {
    const list = document.getElementById('activeList');
    const emptyMsg = document.getElementById('emptyMsg');

    const data = snapshot.val();
    if (!data) {
      allChannels = [];
      emptyMsg.style.display = '';
      emptyMsg.textContent = '진행 중인 채널이 없습니다';
      renderFilter();
      return;
    }

    allChannels = Object.entries(data).map(([id, g]) => ({ id, g }));
    emptyMsg.style.display = 'none';
    renderFilter();
  });

  function renderFilter() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    const list = document.getElementById('activeList');
    const noResult = document.getElementById('noResultMsg');
    const emptyMsg = document.getElementById('emptyMsg');

    // 기존 카드 제거
    list.querySelectorAll('.active-card').forEach(el => el.remove());

    if (allChannels.length === 0) {
      emptyMsg.style.display = '';
      noResult.style.display = 'none';
      return;
    }

    emptyMsg.style.display = 'none';

    const filtered = query
      ? allChannels.filter(({ id, g }) => {
          return id.toLowerCase().includes(query)
            || (g.playerA?.name || '').toLowerCase().includes(query)
            || (g.playerB?.name || '').toLowerCase().includes(query);
        })
      : allChannels;

    if (filtered.length === 0) {
      noResult.style.display = '';
    } else {
      noResult.style.display = 'none';
      filtered.forEach(({ id, g }) => {
        const card = document.createElement('div');
        card.className = 'active-card';

        const nameA = g.playerA?.name || '플레이어 1';
        const nameB = g.playerB?.name || '플레이어 2';
        const scoreA = g.playerA?.score ?? 0;
        const scoreB = g.playerB?.score ?? 0;
        const setsA = g.playerA?.sets ?? 0;
        const setsB = g.playerB?.sets ?? 0;
        const enc = encodeURIComponent(id);

        card.innerHTML = `
          <div class="ch-id">${escHtml(id)}</div>
          <div class="ch-info">
            <div class="ch-matchup">${escHtml(nameA)} vs ${escHtml(nameB)}</div>
            <div class="ch-score">
              <span class="sa">${scoreA}</span>
              <span style="color:rgba(255,255,255,0.2)"> : </span>
              <span class="sb">${scoreB}</span>
              <span style="margin-left:8px;color:rgba(255,255,255,0.2)">세트 ${setsA}-${setsB}</span>
            </div>
          </div>
          <div class="card-actions">
            <a class="card-btn score" href="scoreboard.html?ch=${enc}">점수판</a>
            <a class="card-btn ctrl" href="controller.html?ch=${enc}">컨트롤</a>
            <button class="card-btn del" title="채널 삭제">✕</button>
          </div>`;
        card.querySelector('.card-btn.del').addEventListener('click', () => openConfirm(id));
        list.appendChild(card);
      });
    }
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('searchInput').addEventListener('input', renderFilter);

  let pendingDeleteId = null;

  const DELETE_PIN = '1004';

  window.openConfirm = (id) => {
    pendingDeleteId = id;
    document.getElementById('confirmMsg').innerHTML = `<b style="color:#fff">${escHtml(id)}</b> 채널을 삭제하려면<br>비밀번호를 입력하세요`;
    document.getElementById('pinInput').value = '';
    document.getElementById('pinError').textContent = '';
    document.getElementById('confirmOverlay').classList.add('open');
    setTimeout(() => document.getElementById('pinInput').focus(), 100);
  };

  window.closeConfirm = () => {
    pendingDeleteId = null;
    document.getElementById('confirmOverlay').classList.remove('open');
  };

  window.doDelete = async () => {
    if (!pendingDeleteId) return;
    const pin = document.getElementById('pinInput').value;
    if (pin !== DELETE_PIN) {
      document.getElementById('pinError').textContent = '비밀번호가 틀렸습니다';
      document.getElementById('pinInput').value = '';
      document.getElementById('pinInput').focus();
      return;
    }
    await remove(ref(db, 'game/' + pendingDeleteId));
    closeConfirm();
  };

  document.getElementById('pinInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doDelete();
  });

  document.getElementById('confirmOverlay').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeConfirm();
  });
</script>

<script>
  function goCustom() {
    const val = document.getElementById('customCh').value.trim();
    if (!val) return;
    window.location.href = 'scoreboard.html?ch=' + encodeURIComponent(val);
  }
  document.getElementById('customCh').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') goCustom();
  });
</script>
<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
